<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flappy Bird Persistent Tournament</title>
    <style>
        :root {
            --bg-color: #111;
            --accent-color: #f1c40f;
            --accent-hover: #f39c12;
            --text-color: #ffffff;
            --ui-bg: rgba(20, 24, 35, 0.95);
            --border-color: #34495e;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 850px;
            aspect-ratio: 9 / 16;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            background: #4ec0ca;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.4);
            color: var(--text-color);
            z-index: 10;
            transition: opacity 0.3s ease, visibility 0.3s;
            opacity: 1;
            visibility: visible;
        }
        .overlay-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .ui-panel {
            background: var(--ui-bg);
            border: 3px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.2rem;
            color: var(--accent-color);
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-bottom: 20px;
        }
        .btn {
            background: #e67e22;
            border: none;
            padding: 14px 32px;
            font-size: 1.25rem;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 5px 0px #d35400;
            transition: all 0.1s ease;
            display: inline-block;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            width: 80%;
            margin: 10px 0;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #d35400;
        }
        .leaderboard-container {
            width: 100%;
            flex-grow: 1;
            margin: 20px 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .leaderboard-title {
            font-size: 1.1rem;
            color: #2ecc71;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 1px 1px 1px #000;
        }
        .leaderboard-list {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            border: 1px solid #444;
            overflow-y: auto;
            flex-grow: 1;
            padding: 5px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
            border-radius: 6px;
        }
        .leaderboard-row:last-child { border-bottom: none; }
        .rank-1 { background: rgba(241, 196, 15, 0.15); color: #f1c40f; font-weight: bold; border: 1px solid rgba(241, 196, 15, 0.3); }
        .rank-2 { background: rgba(189, 195, 199, 0.15); color: #ecf0f1; font-weight: bold; }
        .rank-3 { background: rgba(230, 126, 34, 0.15); color: #e67e22; font-weight: bold; }
        
        .input-group {
            width: 100%;
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: #111;
            color: #fff;
            text-align: center;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--accent-color);
        }
        #scoreBadge {
            font-size: 3rem;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            margin: 10px 0;
        }
        .player-tag-display {
            font-size: 0.95rem;
            color: #2ecc71;
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="viewport">
    <canvas id="gameCanvas"></canvas>

    <!-- First Time Setup Overlay -->
    <div id="onboardingScreen" class="overlay-screen hidden" style="z-index: 20; background: rgba(10, 15, 20, 0.98);">
        <div class="ui-panel" style="margin-top: auto; margin-bottom: auto;">
            <h1>PILOT REGISTRATION</h1>
            <div class="subtitle" style="margin-bottom: 25px;">Establish identity file for world rankings</div>
            <div class="input-group">
                <input type="text" id="onboardNameInput" placeholder="NICKNAME" maxlength="12">
            </div>
            REGISTER PILOT</button>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="overlay-screen">
        <div class="ui-panel">
            <h1>Flappy World</h1>
            <div class="subtitle">Global HTML5 Tournament</div>
            <div class="player-tag-display" id="activePilotTag">Pilot: Unknown</div>
            <button class="btn" id="startBtn">START ENGINE</button>
        </div>
        <div class="leaderboard-container ui-panel">
            <div class="leaderboard-title">🏆 GLOBAL TOP RANKINGS</div>
            <div class="leaderboard-list" id="menuLeaderboardRows">
                <div class="leaderboard-row"><span style="color:#7f8c8d">Syncing data ledger API...</span></div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverMenu" class="overlay-screen hidden">
        <div class="ui-panel">
            <h1>ROUND OVER</h1>
            <div id="scoreBadge">0</div>
            
            <div id="highScoreCelebration" style="color: #2ecc71; font-weight: bold; margin-bottom: 10px; display: none;">
                🎉 NEW PERSONAL BEST! 🎉
            </div>

            <div id="liveSubmissionFeedback" style="font-size: 0.95rem; color: #bdc3c7;">
                Transmitting performance metrics...
            </div>
        </div>

        <div class="leaderboard-container ui-panel">
            <div class="leaderboard-title">⚡ UPDATED WORLD STANDINGS</div>
            <div class="leaderboard-list" id="gameLeaderboardRows"></div>
        </div>
        
        <button class="btn" id="restartBtn">RETRY COMPETE</button>
    </div>
</div>

<script>
/**
 * Flappy Bird Game Engine - Fixed Non-Blocking Asset Pipelines
 */

(function () {
    'use strict';

    const NETWORK_ENDPOINT = 'jsonbin.io';
    const ACCESS_ROUTING_KEY = '$2a$10$9GvFhXkZ8e.2Qp9NBy8Nbe6dDlzxM66mF8p7gKxlmFh4t1Z5rGvIq';

    let globalStandings = [
        { name: "AlphaFlap", score: 125 },
        { name: "ByteChirper", score: 98 },
        { name: "WebGlMaster", score: 74 },
        { name: "SkyRunner", score: 45 },
        { name: "NexusBird", score: 22 }
    ];

    let playerProfile = { nickname: "", localHighScore: 0 };

    // --- NON-BLOCKING ASSET CONFIGURATION ---
    const assets = { bird: null, pipeTop: null, pipeBottom: null, bg: null };
    let assetsLoaded = false;

    function preLoadAssets() {
        let loadedCount = 0;
        const total = 4;
        const onAssetLoad = () => {
            loadedCount++;
            if (loadedCount === total) assetsLoaded = true;
        };
        const onAssetError = (e) => {
            console.warn("Asset skipped. Running standalone graphic engine fallback vectors.");
            onAssetLoad(); 
        };

        assets.bird = new Image(); assets.bird.src = 'bird.png';
        assets.bird.onload = onAssetLoad; assets.bird.onerror = onAssetError;

        assets.pipeTop = new Image(); assets.pipeTop.src = 'pipe-top.png';
        assets.pipeTop.onload = onAssetLoad; assets.pipeTop.onerror = onAssetError;

        assets.pipeBottom = new Image(); assets.pipeBottom.src = 'pipe-bottom.png';
        assets.pipeBottom.onload = onAssetLoad; assets.pipeBottom.onerror = onAssetError;

        assets.bg = new Image(); assets.bg.src = 'bg.png';
        assets.bg.onload = onAssetLoad; assets.bg.onerror = onAssetError;
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    let scale = 1;
    const virtualWidth = 360;
    const virtualHeight = 640;

    let gameState = 'MENU'; 
    let ticks = 0;
    let currentScore = 0;

    let birdEntity = null;
    let activePipes = [];
    let backgroundLayers = [];

    function resizeDisplay() {
        const w = viewport.clientWidth;
        const h = viewport.clientHeight;
        canvas.width = w;
        canvas.height = h;
        scale = w / virtualWidth;
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resizeDisplay);
    resizeDisplay();

    function checkIdentityMatrix() {
        const storedName = localStorage.getItem('flappy_pilot_name');
        const storedHighScore = localStorage.getItem('flappy_pilot_highscore');

        if (storedHighScore) playerProfile.localHighScore = parseInt(storedHighScore, 10);

        if (!storedName) {
            document.getElementById('onboardingScreen').classList.remove('hidden');
        } else {
            playerProfile.nickname = storedName;
            document.getElementById('activePilotTag').innerText = `Pilot: ${playerProfile.nickname} | PB: ${playerProfile.localHighScore}`;
        }
    }

    function saveNewIdentity() {
        const inputField = document.getElementById('onboardNameInput');
        const processingName = inputField.value.trim().toUpperCase();

        if (!processingName || processingName.length < 2) {
            alert("NICKNAME CRITICAL LIMIT ERROR: MUST BE AT LEAST 2 CHARACTERS");
            return;
        }

        localStorage.setItem('flappy_pilot_name', processingName);
        playerProfile.nickname = processingName;
        
        document.getElementById('activePilotTag').innerText = `Pilot: ${playerProfile.nickname} | PB: ${playerProfile.localHighScore}`;
        document.getElementById('onboardingScreen').classList.add('hidden');
    }

    class BackgroundLayer {
        constructor(speedFactor, color) {
            this.speedFactor = speedFactor;
            this.color = color;
            this.x = 0;
        }
        update() {
            if (gameState === 'PLAYING') {
                this.x -= 0.5 * this.speedFactor * scale;
                if (this.x <= -canvas.width) this.x = 0;
            }
        }
        draw() {
            if (assetsLoaded && assets.bg.naturalWidth > 0) {
                ctx.drawImage(assets.bg, this.x, 0, canvas.width, canvas.height);
                ctx.drawImage(assets.bg, this.x + canvas.width, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, canvas.height - (120 * scale), canvas.width + 2, 120 * scale);
                ctx.fillRect(this.x + canvas.width, canvas.height - (120 * scale), canvas.width + 2, 120 * scale);
            }
        }
    }

    class Bird {
        constructor() {
            this.radius = 13 * scale;
            this.x = 75 * scale;
            this.y = (virtualHeight / 2) * scale;
            this.velocity = 0;
            this.gravity = 0.38 * scale;
            this.lift = -7.2 * scale;
            this.tilt = 0;
        }
        update() {
            this.velocity += this.gravity;
            this.y += this.velocity;

            if (this.velocity < 0) this.tilt = Math.max(this.tilt - 0.1, -0.4);
            else this.tilt = Math.min(this.tilt + 0.06, 0.88);

            if (this.y < this.radius) { this.y = this.radius; this.velocity = 0; }
            if (this.y > canvas.height - (120 * scale)) processStructuralFailure();
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.tilt);
            if (assetsLoaded && assets.bird.naturalWidth > 0) {
                ctx.drawImage(assets.bird, -this.radius * 1.5, -this.radius * 1.5, this.radius * 3, this.radius * 3);
            } else {
                ctx.fillStyle = '#f1c40f'; ctx.strokeStyle = '#d35400'; ctx.lineWidth = 3 * scale;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(4*scale, -3*scale, 3*scale, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
        triggerPropulsion() { this.velocity = this.lift; }
    }

    class PipeObstacle {
        constructor() {
            this.width = 62 * scale;
            this.gapSize = 135 * scale;
            this.x = canvas.width;
            this.speed = 2.4 * scale;
            this.passed = false;

            const margin = 60 * scale;
            const usableRange = canvas.height - (120 * scale) - this.gapSize - (margin * 2);
            this.topHeight = margin + (Math.random() * usableRange);
            this.bottomY = this.topHeight + this.gapSize;
            this.bottomHeight = canvas.height - this.bottomY;
        }
        update() {
            this.x -= this.speed;
            if (birdEntity.x + birdEntity.radius > this.x && birdEntity.x - birdEntity.radius < this.x + this.width) {
                if (birdEntity.y - birdEntity.radius < this.topHeight || birdEntity.y + birdEntity.radius > this.bottomY) {
                    processStructuralFailure();
                }
            }
            if (!this.passed && this.x + this.width / 2 < birdEntity.x) {
                this.passed = true;
                currentScore++;
            }
        }
        draw() {
            if (assetsLoaded && assets.pipeTop.naturalWidth > 0) {
                ctx.drawImage(assets.pipeTop, this.x, 0, this.width, this.topHeight);
                ctx.drawImage(assets.pipeBottom, this.x, this.bottomY, this.width, this.bottomHeight);
            } else {
                ctx.fillStyle = '#2ecc71'; ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 3 * scale;
                ctx.fillRect(this.x, 0, this.width, this.topHeight);
                ctx.strokeRect(this.x, -5, this.width, this.topHeight + 5);
                ctx.fillRect(this.x, this.bottomY, this.width, this.bottomHeight);
                ctx.strokeRect(this.x, this.bottomY, this.width, this.bottomHeight + 5);
            }
        }
    }

    function bootGameSystem() {
        birdEntity = new Bird();
        activePipes = [];
        backgroundLayers = [new BackgroundLayer(0.4, '#2980b9'), new BackgroundLayer(1.0, '#27ae60')];
        currentScore = 0;
        ticks = 0;
    }

    function processStructuralFailure() {
        gameState = 'GAMEOVER';
        document.getElementById('scoreBadge').innerText = currentScore;
        
        const celebBadge = document.getElementById('highScoreCelebration');
        if (currentScore > playerProfile.localHighScore) {
            playerProfile.localHighScore = currentScore;
            localStorage.setItem('flappy_pilot_highscore', currentScore);
            celebBadge.style.display = 'block';
            document.getElementById('activePilotTag').innerText = `Pilot: ${playerProfile.nickname} | PB: ${playerProfile.localHighScore}`;
        } else {
            celebBadge.style.display = 'none';
        }

        document.getElementById('gameOverMenu').classList.remove('hidden');
        synchronizeScoreToCloud();
    }

    function executionFrame() {
        ctx.fillStyle = '#4ec0ca'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        backgroundLayers.forEach(layer => { layer.update(); layer.draw(); });

        if (gameState === 'PLAYING') {
            ticks++;
            if (ticks % 100 === 0) activePipes.push(new PipeObstacle());
            birdEntity.update();
            for (let i = activePipes.length - 1; i >= 0; i--) {
                activePipes[i].update(); activePipes[i].draw();
                if (activePipes[i].x + activePipes[i].width < 0) activePipes.splice(i, 1);
            }
        } else if (gameState === 'GAMEOVER') {
            activePipes.forEach(p => p.draw());
        }

        birdEntity.draw();

        // Floor element bar visual anchor
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(0, canvas.height - (120 * scale), canvas.width, 10 * scale);
        ctx.fillStyle = '#d35400';
        ctx.fillRect(0, canvas.height - (110 * scale), canvas.width, 110 * scale);

        if (gameState === 'PLAYING') {
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 5 * scale;
            ctx.font = `bold ${38 * scale}px sans-serif`; ctx.textAlign = 'center';
            ctx.strokeText(currentScore, canvas.width / 2, 70 * scale);
            ctx.fillText(currentScore, canvas.width / 2, 70 * scale);
        }
        requestAnimationFrame(executionFrame);
    }

    async function updateNetworkLedger() {
        try {
            const res = await fetch(NETWORK_ENDPOINT, {
                method: 'GET', headers: { 'X-Master-Key': ACCESS_ROUTING_KEY }
            });
            if (res.ok) {
                const dataPacket = await res.json();
                if (dataPacket.record && Array.isArray(dataPacket.record.scores)) {
                    globalStandings = dataPacket.record.scores;
                }
            }
        } catch (e) { console.warn("Online score servers unreachable."); }
        renderLeaderboardDOM('menuLeaderboardRows');
        renderLeaderboardDOM('gameLeaderboardRows');
    }

    async function synchronizeScoreToCloud() {
        document.getElementById('liveSubmissionFeedback').innerText = "Transmitting score to ledger...";
        
        const existingEntryIndex = globalStandings.findIndex(e => e.name === playerProfile.nickname);
        if (existingEntryIndex !== -1) {
            if (currentScore > globalStandings[existingEntryIndex].score) {
                globalStandings[existingEntryIndex].score = currentScore;
            }
        } else {
            globalStandings.push({ name: playerProfile.nickname, score: currentScore });
        }

        globalStandings.sort((a, b) => b.score - a.score);
        globalStandings = globalStandings.slice(0, 8);

        renderLeaderboardDOM('gameLeaderboardRows');

        try {
            const res = await fetch(NETWORK_ENDPOINT, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': ACCESS_ROUTING_KEY },
                body: JSON.stringify({ scores: globalStandings })
            });
            if(res.ok) {
                document.getElementById('liveSubmissionFeedback').innerText = "Score processed successfully ✅";
            } else {
                document.getElementById('liveSubmissionFeedback').innerText = "Ledger transmission rejection ❌";
            }
        } catch (err) {
            document.getElementById('liveSubmissionFeedback').innerText = "Database sync error offline 💾";
        }
    }

    function renderLeaderboardDOM(targetContainerId) {
        const element = document.getElementById(targetContainerId);
        if (!element) return;
        element.innerHTML = '';
        globalStandings.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = `leaderboard-row rank-${index + 1}`;
            row.innerHTML = `<span>${index + 1}. ${item.name}</span><span>${item.score} PTS</span>`;
            element.appendChild(row);
        });
    }

    const handleActionInput = function (e) {
        if (e.cancelable) e.preventDefault();
        if (gameState === 'PLAYING') birdEntity.triggerPropulsion();
    };
    canvas.addEventListener('touchstart', handleActionInput, { passive: false });
    canvas.addEventListener('mousedown', handleActionInput);

    document.getElementById('startBtn').addEventListener('click', function () {
        gameState = 'PLAYING';
        document.getElementById('mainMenu').classList.add('hidden');
        bootGameSystem();
    });
    document.getElementById('restartBtn').addEventListener('click', function () {
        gameState = 'PLAYING';
        document.getElementById('gameOverMenu').classList.add('hidden');
        bootGameSystem();
    });
    document.getElementById('saveIdentityBtn').addEventListener('click', saveNewIdentity);

    // --- INITIALIZE BOOT SEQUENCE ---
    preLoadAssets();
    bootGameSystem();
    checkIdentityMatrix();
    updateNetworkLedger();
    requestAnimationFrame(executionFrame);
})();
</script>
</body>
</html>
