<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro 3D Horizon Racer</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --accent-color: #00ffcc;
            --accent-purple: #9900ff;
            --text-color: #ffffff;
            --panel-bg: rgba(15, 18, 32, 0.9);
            --border-ui: #232741;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 500px;
            aspect-ratio: 16 / 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #000;
            border: 4px solid var(--border-ui);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            pointer-events: none;
            color: var(--text-color);
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            pointer-events: auto;
        }
        .hud-card {
            background: var(--panel-bg);
            border: 2px solid var(--border-ui);
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 5px var(--accent-color);
            box-shadow: inset 0 0 10px rgba(0,255,204,0.1);
        }
        .hud-value {
            color: var(--accent-color);
        }
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 12, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .hidden {
            display: none !important;
        }
        h1 {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0,255,204,0.6);
        }
        .subtitle {
            font-size: 0.9rem;
            color: #8a8fa3;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .btn {
            background: var(--accent-purple);
            border: 2px solid #b34dff;
            color: white;
            padding: 14px 40px;
            font-size: 1.3rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #6600cc, 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #6600cc, 0 4px 10px rgba(0,0,0,0.5);
        }
        .stats-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-ui);
            padding: 15px;
            margin-bottom: 25px;
            width: 80%;
            max-width: 400px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        /* Mobile Touch Controls Overlay */
        #mobileControls {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 5;
        }
        .ctrl-btn {
            width: 75px;
            height: 75px;
            background: rgba(20, 24, 43, 0.75);
            border: 2px solid var(--border-ui);
            border-radius: 50%;
            color: var(--text-color);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .ctrl-btn:active {
            background: rgba(0, 255, 204, 0.3);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

<div id="viewport">
    <canvas id="gameCanvas"></canvas>

    <!-- Live Gameplay HUD Layer -->
    <div class="ui-layer">
        <div class="hud-row">
            <div class="hud-card">SPEED: <span id="hudSpeed" class="hud-value">0</span> KM/H</div>
            <div class="hud-card">SCORE: <span id="hudScore" class="hud-value">00000</span></div>
        </div>
        <div class="hud-row" style="justify-content: flex-end;">
            <div class="hud-card">STAGE: <span id="hudStage" class="hud-value">1</span></div>
        </div>
    </div>

    <!-- Main Title Screen Menu Menu -->
    <div id="mainMenu" class="screen-overlay">
        <h1>Neon Horizon 3D</h1>
        <div class="subtitle">Procedural Synthwave Racing Engine</div>
        <div class="stats-box">
            <div style="color: var(--accent-color); text-align: center; margin-bottom: 5px;">🏆 ALL-TIME BEST</div>
            <div style="display:flex; justify-content:space-between;"><span>RECORD PILOT:</span><span id="bestDriver">GUEST</span></div>
            <div style="display:flex; justify-content:space-between;"><span>HIGH SCORE:</span><span id="bestScore" style="color:var(--accent-color)">00000</span></div>
        </div>
        <button class="btn" id="startRaceBtn">START DRIVE</button>
    </div>

    <!-- Game Over Crash Menu Screen -->
    <div id="gameOverMenu" class="screen-overlay hidden">
        <h1 style="color: #ff3366; text-shadow: 0 0 15px rgba(255,51,102,0.6);">VEHICLE CRASHED</h1>
        <div class="subtitle">System structural integrity compromised</div>
        <div class="stats-box">
            <div style="display:flex; justify-content:space-between; margin-bottom: 5px;"><span>FINAL SCORE:</span><span id="finalScore" style="color:var(--accent-color)">0</span></div>
            <div style="display:flex; justify-content:space-between;"><span>DISTANCE COVERED:</span><span id="finalDistance" style="color:#ffcc00">0M</span></div>
        </div>
        <button class="btn" id="retryRaceBtn">RECOMPUTE RUN</button>
    </div>

    <!-- Touch Interface (Visible on mobile viewports automatically) -->
    <div id="mobileControls" class="hidden">
        <div style="display:flex; gap: 15px;">
            <div class="ctrl-btn" id="btnLeft">◀</div>
            <div class="ctrl-btn" id="btnRight">▶</div>
        </div>
        <div style="display:flex; gap: 15px;">
            <div class="ctrl-btn" id="btnBrake" style="background: rgba(255, 51, 102, 0.2); border-color: #ff3366;">S</div>
            <div class="ctrl-btn" id="btnGas" style="background: rgba(0, 255, 204, 0.2); border-color: var(--accent-color);">F</div>
        </div>
    </div>
</div>

<script>
/**
 * 3D Pseudo-Retro Racing Engine
 * Core Engineering: Mathematical camera horizon coordinate project scaling arrays
 */

(function() {
    'use strict';

    // --- GAME ENGINE CONSTANTS ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    const fps = 60;
    const step = 1 / fps;
    const canvasWidth = 800;
    const canvasHeight = 500;

    // Mathematical pseudo projection configurations
    const segmentLength = 200; 
    const cameraDepth = 0.84; 
    const roadWidth = 2000; 
    const viewDistance = 50; 
    const maxSpeed = 240; 
    const accel = 3.5;
    const breaking = -8;
    const decel = -1.5;
    const centrifugal = 0.35;

    // --- ENGINE VARIABLE POOLS ---
    let segments = [];
    let obstacles = [];
    let trackLength = 0;
    
    // Physics tracking inputs state values
    let playerX = 0; 
    let playerZ = 0; 
    let speed = 0;
    let totalScore = 0;
    let currentStage = 1;

    let keyLeft = false, keyRight = false, keyFaster = false, keySlower = false;

    // --- TRACK GENERATOR ALGORITM ---
    function addSegment(curve, y) {
        let n = segments.length;
        segments.push({
            index: n,
            p1: { world: { x: 0, y: lastY(), z: n * segmentLength }, screen: { x: 0, y: 0, w: 0 } },
            p2: { world: { x: 0, y: y, z: (n + 1) * segmentLength }, screen: { x: 0, y: 0, w: 0 } },
            curve: curve,
            color: Math.floor(n / 3) % 2 ? { road: '#1e2030', grass: '#0b0c10', rumble: '#9900ff' } : { road: '#171824', grass: '#0f1015', rumble: '#00ffcc' }
        });
    }

    function lastY() { return segments.length === 0 ? 0 : segments[segments.length - 1].p2.world.y; }

    function addRoadLine(num, curve, height) {
        for (let i = 0; i < num; i++) {
            addSegment(curve, lastY() + height);
        }
    }

    function buildProceduralWorldTrack() {
        segments = [];
        // Sequential section layout expansions
        addRoadLine(100, 0, 0);
        addRoadLine(80, 2, 10);
        addRoadLine(60, 0, 0);
        addRoadLine(100, -3, -15);
        addRoadLine(90, 4, 5);
        addRoadLine(120, 0, 0);
        addRoadLine(80, -2, 20);
        addRoadLine(100, 1, -10);
        addRoadLine(150, 0, 0);

        trackLength = segments.length * segmentLength;
        generateObstacles();
    }

    function generateObstacles() {
        obstacles = [];
        // Scatter static obstacle meshes across lines randomly
        for (let i = 40; i < segments.length - 20; i += 12) {
            if (Math.random() > 0.4) {
                obstacles.push({
                    segmentIndex: i,
                    lineOffset: (Math.random() * 1.6) - 0.8, // -1 is left edge, 1 is right edge
                    widthFactor: 120,
                    color: Math.random() > 0.5 ? '#ff3366' : '#ffcc00'
                });
            }
        }
    }

    // --- MATHEMATICAL CAMERA PROJECTION COORDINATE TRANSFORM MATRIX ---
    function project3DCoordinates(p, cameraX, cameraY, cameraZ) {
        p.camera = {
            x: (p.world.x || 0) - cameraX,
            y: (p.world.y || 0) - cameraY,
            z: (p.world.z || 0) - cameraZ
        };
        p.screen.scale = cameraDepth / p.camera.z;
        p.screen.x = Math.round((canvasWidth / 2) + (p.screen.scale * p.camera.x * canvasWidth / 2));
        p.screen.y = Math.round((canvasHeight / 2) - (p.screen.scale * p.camera.y * canvasHeight / 2));
        p.screen.w = Math.round(p.screen.scale * roadWidth * canvasWidth / 2);
    }

    function findSegment(z) {
        return segments[Math.floor(z / segmentLength) % segments.length];
    }

    // --- MAIN PHYSICS UPDATING CORE ---
    function updatePhysicsEngine(dt) {
        // Linear velocity tracking calculation
        if (keyFaster) speed += accel;
        else if (keySlower) speed += breaking;
        else speed += decel;

        speed = Math.max(0, Math.min(speed, maxSpeed));

        // Advance vehicle tracking positions
        playerZ += speed * 5 * dt;
        if (playerZ >= trackLength) {
            playerZ -= trackLength; // Loop vehicle tracking loops safely
            currentStage++;
            document.getElementById('hudStage').innerText = currentStage;
        }

        const currentSeg = findSegment(playerZ);
        
        // Centrifugal adjustments running tracking calculation algorithms
        playerX = playerX - (dt * (speed / maxSpeed) * currentSeg.curve * centrifugal);

        if (keyLeft) playerX -= 0.05 * (speed / maxSpeed + 0.2);
        if (keyRight) playerX += 0.05 * (speed / maxSpeed + 0.2);

        // Clamp tracking bounds boundary metrics
        playerX = Math.max(-2, Math.min(playerX, 2));

        // Score system metrics advance
        if (speed > 10) {
            totalScore += Math.floor(speed * 0.05);
            document.getElementById('hudScore').innerText = String(totalScore).padStart(5, '0');
        }
        document.getElementById('hudSpeed').innerText = Math.round(speed);

        // Collision validation routines matching active array bounds
        obstacles.forEach(obs => {
            const obsSeg = segments[obs.segmentIndex];
            const distanceZ = obsSeg.p1.world.z - playerZ;
            
            // Validate proximity parameters
            if (distanceZ > 0 && distanceZ < 150) {
                if (Math.abs(playerX - obs.lineOffset) < 0.45) {
                    if (speed > 30) {
                        triggerSystemCrash();
                    }
                }
            }
        });
    }

    function triggerSystemCrash() {
        speed = 0;
        gameState = 'GAMEOVER';
        document.getElementById('finalScore').innerText = totalScore;
        document.getElementById('finalDistance').innerText = Math.floor(playerZ) + "M";
        document.getElementById('gameOverMenu').classList.remove('hidden');

        // Store persistent record profiles locally
        const currentBest = parseInt(localStorage.getItem('race_high') || 0, 10);
        if (totalScore > currentBest) {
            localStorage.setItem('race_high', totalScore);
        }
    }

    // --- PIPELINE SCREEN RENDER CONTROLLER ---
    function renderPipeline() {
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);

        // 1. Draw Linear Backdrop Elements Sky/Horizon Line Arrays
        ctx.fillStyle = '#05060c'; ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        ctx.fillStyle = '#140827'; ctx.fillRect(0, canvasHeight / 2, canvasWidth, canvasHeight / 2);

        // Render Horizon Synthwave Ambient Glow Elements
        let gradient = ctx.createLinearGradient(0, canvasHeight/4, 0, canvasHeight/2);
        gradient.addColorStop(0, '#05060c'); gradient.addColorStop(1, '#9900ff');
        ctx.fillStyle = gradient; ctx.fillRect(0, canvasHeight / 4, canvasWidth, canvasHeight / 4);

        // 2. Render Mathematical 3D Road Segments Array Pools
        const baseSegment = findSegment(playerZ);
        const basePercent = (playerZ % segmentLength) / segmentLength;
        const playerPercentY = baseSegment.p1.world.y + (baseSegment.p2.world.y - baseSegment.p1.world.y) * basePercent;
        
        let maxY = canvasHeight;
        let xContextShift = 0;
        let segmentCurveAccumulator = 0;

        for (let i = 0; i < viewDistance; i++) {
            const segment = segments[(baseSegment.index + i) % segments.length];
            const looped = segment.index < baseSegment.index;
            
            project3DCoordinates(
                segment.p1, 
                playerX * roadWidth - xContextShift, 
                playerPercentY + 1500, 
                playerZ - (looped ? trackLength : 0)
            );
            project3DCoordinates(
                segment.p2, 
                playerX * roadWidth - xContextShift - segment.curve, 
                playerPercentY + 1500, 
                playerZ - (looped ? trackLength : 0)
            );

            xContextShift += segmentCurveAccumulator;
            segmentCurveAccumulator += segment.curve;

            const p1 = segment.p1.screen;
            const p2 = segment.p2.screen;

            // Visibility clipping rules algorithm logic
            if (p1.z <= cameraDepth || p2.y >= maxY || p2.y >= p1.y) continue;

            // Render Ground Background Bands
            ctx.fillStyle = segment.color.grass;
            ctx.fillRect(0, p2.y, canvasWidth, p1.y - p2.y);

            // Render Core Road Poly Layout Arrays
            drawProceduralTrapezoid(p1.x, p1.y, p1.w, p2.x, p2.y, p2.w, segment.color.road);
            
            // Render Side Border Rumble Strips
            drawProceduralTrapezoid(p1.x - p1.w * 1.05, p1.y, p1.w * 0.05, p2.x - p2.w * 1.05, p2.y, p2.w * 0.05, segment.color.rumble);
            drawProceduralTrapezoid(p1.x + p1.w, p1.y, p1.w * 0.05, p2.x + p2.w, p2.y, p2.w * 0.05, segment.color.rumble);

            maxY = p1.y;
        }

        // 3. Render Spaced Obstacle Meshes Inside Virtual Frame View Blocks
        for (let i = viewDistance - 1; i > 0; i--) {
            const segment = segments[(baseSegment.index + i) % segments.length];
            
            obstacles.forEach(obs => {
                if (obs.segmentIndex === segment.index) {
                    const p1 = segment.p1.screen;
                    const scaleFactor = p1.scale;
                    const obstacleX = p1.x + Math.round(scaleFactor * obs.lineOffset * roadWidth * canvasWidth / 2);
                    const obstacleY = p1.y;
                    const size = Math.round(scaleFactor * obs.widthFactor * canvasWidth / 2);

                    // Procedural high fidelity obstacle tower layout matrix mesh
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(obstacleX - size / 2, obstacleY - size * 2, size, size * 2);
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(obstacleX - size * 0.3, obstacleY - size * 1.7, size * 0.6, size * 0.4);
                }
            });
        }

        // 4. Render Cockpit Player Car Mesh Matrix Element Layout Overlay
        drawProceduralPlayerVehicle();
    }

    function drawProceduralTrapezoid(x1, y1, w1, x2, y2, w2, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x1 - w1, y1);
        ctx.lineTo(x2 - w2, y2);
        ctx.lineTo(x2 + w2, y2);
        ctx.lineTo(x1 + w1, y1);
        ctx.closePath();
        ctx.fill();
    }

    function drawProceduralPlayerVehicle() {
        const carWidth = 140;
        const carHeight = 70;
        const screenX = canvasWidth / 2;
        const screenY = canvasHeight - 40;

        // Draw shadow layer matching placement arrays
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(screenX - carWidth / 2, screenY - 5, carWidth, 20);

        // Core chassis hull block element
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(screenX - carWidth / 2, screenY - carHeight, carWidth, carHeight);
        
        // Active visual neon body accent outlines
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 4;
        ctx.strokeRect(screenX - carWidth / 2, screenY - carHeight, carWidth, carHeight);

        // Jet Engine Exhaust Arrays Glowing Elements
        ctx.fillStyle = speed > 10 ? '#ff3366' : '#551122';
        ctx.fillRect(screenX - carWidth * 0.3, screenY - carHeight * 0.6, carWidth * 0.2, carHeight * 0.3);
        ctx.fillRect(screenX + carWidth * 0.1, screenY - carHeight * 0.6, carWidth * 0.2, carHeight * 0.3);
    }

    // --- GAME ENGINE LOOP CONTROL PIPELINES ---
    let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER

    function executeLoopCycle() {
        if (gameState === 'PLAYING') {
            updatePhysicsEngine(step);
            renderPipeline();
        }
        requestAnimationFrame(executeLoopCycle);
    }

    function resetEngineSession() {
        playerX = 0; playerZ = 0; speed = 0; totalScore = 0; currentStage = 1;
        document.getElementById('hudStage').innerText = currentStage;
        buildProceduralWorldTrack();
        gameState = 'PLAYING';
    }

    function setupDataIdentities() {
        const score = localStorage.getItem('race_high') || 0;
        document.getElementById('bestScore').innerText = String(score).padStart(5, '0');
    }

    // --- HARDWARE INTERACTIVE EVENT CAPTURES ---
    window.addEventListener('keydown', function(e) {
        if (e.code === 'ArrowLeft'  || e.code === 'KeyA') keyLeft = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keyRight = true;
        if (e.code === 'ArrowUp'    || e.code === 'KeyW') keyFaster = true;
        if (e.code === 'ArrowDown'  || e.code === 'KeyS') keySlower = true;
    });

    window.addEventListener('keyup', function(e) {
        if (e.code === 'ArrowLeft'  || e.code === 'KeyA') keyLeft = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keyRight = false;
        if (e.code === 'ArrowUp'    || e.code === 'KeyW') keyFaster = false;
        if (e.code === 'ArrowDown'  || e.code === 'KeyS') keySlower = false;
    });

    // Touch support triggers interface conversion logic
    if ('ontouchstart' in window) {
        document.getElementById('mobileControls').classList.remove('hidden');
        
        const attachTouch = (id, setter) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); setter(true); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); setter(false); });
        };

        attachTouch('btnLeft', v => keyLeft = v);
        attachTouch('btnRight', v => keyRight = v);
        attachTouch('btnGas', v => keyFaster = v);
        attachTouch('btnBrake', v => keySlower = v);
    }

    // UI Menu Navigation Hooks
    document.getElementById('startRaceBtn').addEventListener('click', () => {
        document.getElementById('mainMenu').classList.add('hidden');
        resetEngineSession();
    });

    document.getElementById('retryRaceBtn').addEventListener('click', () => {
        document.getElementById('gameOverMenu').classList.add('hidden');
        resetEngineSession();
    });

    // Initialize Boot Routine
    setupDataIdentities();
    buildProceduralWorldTrack();
    executeLoopCycle();
})();
</script>
</body>
</html>
