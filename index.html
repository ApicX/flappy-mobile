<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flappy Character Tournament</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-yellow: #f1c40f;
            --panel-bg: rgba(30, 41, 59, 0.95);
            --border-ui: #334155;
            --text-light: #f8fafc;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 430px;
            max-height: 860px;
            aspect-ratio: 9 / 16;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            overflow: hidden;
            background: #4ec0ca;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-light);
            z-index: 10;
            transition: opacity 0.25s ease;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        .ui-panel {
            background: var(--panel-bg);
            border: 2px solid var(--border-ui);
            border-radius: 16px;
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2rem;
            color: var(--accent-yellow);
            text-shadow: 2px 2px 0px #000;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .currency-badge {
            display: inline-block;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--accent-yellow);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            color: var(--accent-yellow);
            margin-bottom: 15px;
        }
        .btn {
            background: #e67e22;
            border: none;
            padding: 12px 28px;
            font-size: 1.15rem;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0px #d35400;
            width: 80%;
            margin: 6px 0;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #d35400;
        }
        .btn.secondary {
            background: #34495e;
            box-shadow: 0 4px 0px #2c3e50;
        }
        /* Character Grid Layout */
        .character-container {
            width: 100%;
            flex-grow: 1;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .grid-title {
            font-size: 1rem;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .character-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-ui);
            flex-grow: 1;
        }
        .char-card {
            background: #334155;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .char-card.selected {
            border-color: var(--accent-yellow);
            background: #1e293b;
        }
        .char-card.locked {
            opacity: 0.7;
            background: #1e293b;
        }
        .char-preview {
            width: 32px;
            height: 32px;
            margin-bottom: 5px;
            border-radius: 50%;
        }
        .price-tag {
            font-weight: bold;
            color: #cbd5e1;
            margin-top: 4px;
        }
        .price-tag.coin {
            color: var(--accent-yellow);
        }
    </style>
</head>
<body>

<div id="viewport">
    <canvas id="gameCanvas"></canvas>

    <!-- Main Menu & Character Selection Layout -->
    <div id="mainMenu" class="screen-overlay">
        <div class="ui-panel">
            <h1>FLAPPY SQUAD</h1>
            <div class="currency-badge">🪙 FEATHERS: <span id="menuCoins">0</span></div>
            <div><button class="btn" id="startBtn">TAP TO FLY</button></div>
        </div>

        <div class="character-container ui-panel">
            <div class="grid-title">SELECT YOUR FLAPPER</div>
            <div class="character-grid" id="charGrid">
                <!-- Dynamically populated card blocks -->
            </div>
        </div>
    </div>

    <!-- Game Over Layout -->
    <div id="gameOverMenu" class="screen-overlay hidden">
        <div class="ui-panel" style="margin-top: auto; margin-bottom: auto;">
            <h1>RUN COMPLETE</h1>
            <div id="scoreBadge" style="font-size: 3rem; margin: 10px 0; font-weight: bold;">0</div>
            <div style="color: #cbd5e1; margin-bottom: 5px;">BEST RUN: <span id="bestScore">0</span></div>
            <div style="color: var(--accent-yellow); font-weight: bold; margin-bottom: 20px;">+<span id="earnedCoins">0</span> FEATHERS EARNED</div>
            <button class="btn" id="restartBtn">FLY AGAIN</button>
            <button class="btn secondary" id="lobbyBtn">BACK TO LOBBY</button>
        </div>
    </div>
</div>

<script>
/**
 * Flappy Bird Engine - Robust Audio Hardware Watchdog & BGM Pipeline
 */

(function () {
    'use strict';

    // --- GAME METRICS & SAVE CONFIGS ---
    let playerWallet = { coins: 0, highScore: 0, activeSkin: "classic", unlocked: ["classic"] };

    const characterDatabase = [
        { id: "classic", name: "Classic", color: "#f1c40f", edge: "#d35400", price: 0, img: "skin_classic.png" },
        { id: "robin", name: "Robin", color: "#e74c3c", edge: "#c0392b", price: 15, img: "skin_robin.png" },
        { id: "neon", name: "Cyber", color: "#00ffcc", edge: "#00b399", price: 35, img: "skin_cyber.png" },
        { id: "shadow", name: "Shadow", color: "#2c3e50", edge: "#1a252f", price: 60, img: "skin_shadow.png" },
        { id: "phoenix", name: "Phoenix", color: "#9b59b6", edge: "#8e44ad", price: 100, img: "skin_phoenix.png" },
        { id: "gold", name: "Solid Gold", color: "#ffffff", edge: "#b59410", price: 200, img: "skin_gold.png", isGold: true }
    ];

    const skinImages = {};
    const skinLoadStatus = {};
    const backgroundImage = new Image();
    let bgLoaded = false;

    // --- SYNTHETIC AUDIO ENGINE ---
    let audioCtx = null;
    let bgmIntervalId = null;
    let bgmStep = 0;

    // Smooth, soothing chord progression frequencies (Arpeggio notes)
    const bgmMelody = [
        261.63, 329.63, 392.00, 523.25, // C Major (C4, E4, G4, C5)
        293.66, 349.23, 440.00, 587.33, // D minor (D4, F4, A4, D5)
        349.23, 440.00, 523.25, 698.46, // F Major (F4, A4, C5, F5)
        392.00, 493.88, 587.33, 783.99  // G Major (G4, B4, D5, G5)
    ];

    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        startBackgroundMusic();
    }

    function playAudioTone(freq, type, duration, vol, slideToFreq = 0) {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        try {
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            if (slideToFreq > 0) {
                osc.frequency.exponentialRampToValueAtTime(slideToFreq, audioCtx.currentTime + duration);
            }

            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch (e) { console.error("Audio glitch minimized."); }
    }

    function startBackgroundMusic() {
        if (bgmIntervalId) return;
        // Loop the chill melody note tracker every 220ms
        bgmIntervalId = setInterval(() => {
            if (gameState === 'PLAYING') {
                let note = bgmMelody[bgmStep % bgmMelody.length];
                // Ultra-soft sine wave tone for low background interference
                playAudioTone(note, 'sine', 0.4, 0.03);
                bgmStep++;
            }
        }, 220);
    }

    function playFlapSound() { playAudioTone(380, 'triangle', 0.12, 0.25, 80); }
    function playScoreSound() {
        playAudioTone(523.25, 'sine', 0.06, 0.1);
        setTimeout(() => { playAudioTone(783.99, 'sine', 0.12, 0.1); }, 60);
    }
    function playCrashSound() { playAudioTone(160, 'sawtooth', 0.45, 0.35, 30); }

    function initAssets() {
        backgroundImage.src = 'bg.png'; 
        backgroundImage.onload = () => { bgLoaded = true; };
        backgroundImage.onerror = () => { bgLoaded = false; };

        characterDatabase.forEach(char => {
            skinImages[char.id] = new Image();
            skinImages[char.id].src = char.img; 
            skinImages[char.id].onload = () => { skinLoadStatus[char.id] = true; };
            skinImages[char.id].onerror = () => { 
                skinLoadStatus[char.id] = false; // Set safe flag immediately if file is missing from git
            }; 
        });
    }

    // --- SYSTEMS CORE HOOKS ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    let scale = 1;
    const virtualWidth = 360;
    const virtualHeight = 640;

    let gameState = 'MENU'; 
    let ticks = 0;
    let currentScore = 0;
    let bgScrollX = 0;

    let birdEntity = null;
    let activePipes = [];

    function resizeDisplay() {
        const w = viewport.clientWidth;
        const h = viewport.clientHeight;
        canvas.width = w;
        canvas.height = h;
        scale = w / virtualWidth;
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resizeDisplay);
    resizeDisplay();

    function loadSavedState() {
        const savedData = localStorage.getItem('flappy_profile_save');
        if (savedData) {
            try {
                const parsed = JSON.parse(savedData);
                playerWallet = { ...playerWallet, ...parsed };
            } catch (e) { console.error("Corrupted profile configurations."); }
        }
        document.getElementById('menuCoins').innerText = playerWallet.coins;
        buildCharacterGridUI();
    }

    function commitSavedState() {
        localStorage.setItem('flappy_profile_save', JSON.stringify(playerWallet));
        document.getElementById('menuCoins').innerText = playerWallet.coins;
    }

    function buildCharacterGridUI() {
        const grid = document.getElementById('charGrid');
        grid.innerHTML = '';

        characterDatabase.forEach(char => {
            const isUnlocked = playerWallet.unlocked.includes(char.id);
            const isSelected = playerWallet.activeSkin === char.id;
            
            const card = document.createElement('div');
            card.className = `char-card ${isSelected ? 'selected' : ''} ${!isUnlocked ? 'locked' : ''}`;
            
            let swatchStyle = `background: ${char.color}; border: 2px solid ${char.edge};`;
            if(char.isGold) swatchStyle = `background: linear-gradient(45deg, #f1c40f, #fff, #f39c12); border: 2px solid #b59410;`;

            card.innerHTML = `
                <div class="char-preview" style="${swatchStyle}"></div>
                <div style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%;">${char.name}</div>
                <div class="price-tag ${!isUnlocked ? 'coin' : ''}">
                    ${isSelected ? 'READY' : (isUnlocked ? 'EQUIP' : '🪙 ' + char.price)}
                </div>
            `;

            card.addEventListener('click', () => handleCardInteraction(char));
            grid.appendChild(card);
        });
    }

    function handleCardInteraction(char) {
        initAudioContext();
        const isUnlocked = playerWallet.unlocked.includes(char.id);

        if (isUnlocked) {
            playerWallet.activeSkin = char.id;
            playAudioTone(600, 'sine', 0.08, 0.15);
        } else {
            if (playerWallet.coins >= char.price) {
                playerWallet.coins -= char.price;
                playerWallet.unlocked.push(char.id);
                playerWallet.activeSkin = char.id;
                playAudioTone(880, 'sine', 0.15, 0.2); 
            } else {
                playAudioTone(140, 'sawtooth', 0.15, 0.2); 
                alert("INSUFFICIENT FEATHERS!");
                return;
            }
        }
        commitSavedState();
        buildCharacterGridUI();
    }

    class Bird {
        constructor() {
            this.radius = 13 * scale;
            this.x = 75 * scale;
            this.y = (virtualHeight / 2) * scale;
            this.velocity = 0;
            this.gravity = 0.38 * scale;
            this.lift = -7.2 * scale;
            this.tilt = 0;
            this.meta = characterDatabase.find(c => c.id === playerWallet.activeSkin) || characterDatabase;
        }
        update() {
            this.velocity += this.gravity;
            this.y += this.velocity;

            if (this.velocity < 0) this.tilt = Math.max(this.tilt - 0.08, -0.4);
            else this.tilt = Math.min(this.tilt + 0.06, 0.85);

            if (this.y < this.radius) { this.y = this.radius; this.velocity = 0; }
            if (this.y > canvas.height - (110 * scale)) triggerCrashSequence();
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.tilt);

            // Bulletproof asset execution checkout
            if (skinLoadStatus[this.meta.id] === true && skinImages[this.meta.id].naturalWidth > 0) {
                ctx.drawImage(skinImages[this.meta.id], -this.radius * 1.5, -this.radius * 1.5, this.radius * 3, this.radius * 3);
            } else {
                ctx.fillStyle = this.meta.color;
                ctx.strokeStyle = this.meta.edge;
                ctx.lineWidth = 3 * scale;

                if(this.meta.isGold) {
                    let grad = ctx.createRadialGradient(-2,-2,2, 0,0,this.radius);
                    grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, '#f1c40f'); grad.addColorStop(1, '#d35400');
                    ctx.fillStyle = grad;
                }

                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(5*scale, -3*scale, 3.5*scale, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(6*scale, -3*scale, 1.5*scale, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
        flap() { 
            this.velocity = this.lift; 
            playFlapSound();
        }
    }

    class PipeObstacle {
        constructor() {
            this.width = 62 * scale;
            this.gap = 135 * scale;
            this.x = canvas.width;
            this.speed = 2.4 * scale;
            this.passed = false;

            const margin = 60 * scale;
            const usableRange = canvas.height - (110 * scale) - this.gap - (margin * 2);
            this.topHeight = margin + (Math.random() * usableRange);
            this.bottomY = this.topHeight + this.gap;
            this.bottomHeight = canvas.height - this.bottomY;
        }
        update() {
            this.x -= this.speed;
            if (birdEntity.x + birdEntity.radius > this.x && birdEntity.x - birdEntity.radius < this.x + this.width) {
                if (birdEntity.y - birdEntity.radius < this.topHeight || birdEntity.y + birdEntity.radius > this.bottomY) {
                    triggerCrashSequence();
                }
            }
            if (!this.passed && this.x + this.width / 2 < birdEntity.x) {
                this.passed = true;
                currentScore++;
                playScoreSound();
            }
        }
        draw() {
            ctx.fillStyle = '#2ecc71'; ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 3 * scale;
            ctx.fillRect(this.x, 0, this.width, this.topHeight);
            ctx.strokeRect(this.x, -5, this.width, this.topHeight + 5);
            ctx.fillRect(this.x, this.bottomY, this.width, this.bottomHeight);
            ctx.strokeRect(this.x, this.bottomY, this.width, this.bottomHeight + 5);
        }
    }

    function resetSession() {
        birdEntity = new Bird();
        activePipes = [];
        currentScore = 0;
        ticks = 0;
    }

    function triggerCrashSequence() {
        gameState = 'GAMEOVER';
        playCrashSound();
        
        playerWallet.coins += currentScore;
        if (currentScore > playerWallet.highScore) {
            playerWallet.highScore = currentScore;
        }
        commitSavedState();

        document.getElementById('scoreBadge').innerText = currentScore;
        document.getElementById('bestScore').innerText = playerWallet.highScore;
        document.getElementById('earnedCoins').innerText = currentScore;
        document.getElementById('gameOverMenu').classList.remove('hidden');
    }

    function runPipelineFrame() {
        if (bgLoaded && backgroundImage.naturalWidth > 0) {
            if (gameState === 'PLAYING') bgScrollX = (bgScrollX - 0.5) % canvas.width;
            ctx.drawImage(backgroundImage, bgScrollX, 0, canvas.width, canvas.height);
            ctx.drawImage(backgroundImage, bgScrollX + canvas.width, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = '#4ec0ca'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (gameState === 'PLAYING') {
            ticks++;
            if (ticks % 100 === 0) activePipes.push(new PipeObstacle());
            birdEntity.update();
            for (let i = activePipes.length - 1; i >= 0; i--) {
                activePipes[i].update(); activePipes[i].draw();
                if (activePipes[i].x + activePipes[i].width < 0) activePipes.splice(i, 1);
            }
        } else if (gameState === 'GAMEOVER') {
            activePipes.forEach(p => p.draw());
        }

        birdEntity.draw();

        ctx.fillStyle = '#e67e22'; ctx.fillRect(0, canvas.height - (110 * scale), canvas.width, 8 * scale);
        ctx.fillStyle = '#d35400'; ctx.fillRect(0, canvas.height - (102 * scale), canvas.width, 102 * scale);

        if (gameState === 'PLAYING') {
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 5 * scale;
            ctx.font = `bold ${40 * scale}px sans-serif`; ctx.textAlign = 'center';
            ctx.strokeText(currentScore, canvas.width / 2, 75 * scale);
            ctx.fillText(currentScore, canvas.width / 2, 75 * scale);
        }
        requestAnimationFrame(runPipelineFrame);
    }

    // Global Hardware Input Interceptor (Guarantees immediate AudioContext unlock)
    const interceptDeviceTouch = function (e) {
        if (e.cancelable) e.preventDefault();
        initAudioContext(); 
        if (gameState === 'PLAYING') birdEntity.flap();
    };
    canvas.addEventListener('touchstart', interceptDeviceTouch, { passive: false });
    canvas.addEventListener('mousedown', interceptDeviceTouch);

    document.getElementById('startBtn').addEventListener('click', function () {
        initAudioContext();
        gameState = 'PLAYING';
        document.getElementById('mainMenu').classList.add('hidden');
        resetSession();
    });
    document.getElementById('restartBtn').addEventListener('click', function () {
        initAudioContext();
        gameState = 'PLAYING';
        document.getElementById('gameOverMenu').classList.add('hidden');
        resetSession();
    });
    document.getElementById('lobbyBtn').addEventListener('click', function () {
        initAudioContext();
        gameState = 'MENU';
        document.getElementById('gameOverMenu').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        loadSavedState(); 
    });

    // --- INITIALIZE BOOT SEQUENCE ---
    initAssets();
    loadSavedState();
    resetSession();
    requestAnimationFrame(runPipelineFrame);
})();
</script>
</body>
</html>
